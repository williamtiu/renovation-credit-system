{% extends 'zh/base.html' %}

{% block title %}登录 - DecoFinance{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white text-center border-0 pt-4">
                <h3 class="mb-0">欢迎回来</h3>
                <p class="text-muted small">请登录以继续。</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary">登录</button>
                    </div>
                    <div class="text-center">
                        <span class="text-muted">还没有账号？</span> 
                        <a href="{{ url_for('auth.register') }}" class="text-decoration-none">注册</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
