{% extends "zh/base.html" %}

{% block title %}{{ '编辑项目' if project else '创建项目' }} - DecoFinance{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>{{ '编辑项目' if project else '创建项目' }}</h2>
    <form method="POST" action="{{ url_for('projects.edit_project', id=project.id) if project else url_for('projects.add_project') }}">
        <div class="card mb-4">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="title">标题</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ project.title if project else '' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="property_type">物业类型</label>
                        <input type="text" class="form-control" id="property_type" name="property_type" value="{{ project.property_type if project else '' }}">
                    </div>
                    <div class="col-md-12 mb-3">
                        <label for="description">描述</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ project.description if project else '' }}</textarea>
                    </div>
                    <div class="col-md-8 mb-3">
                        <label for="property_address">物业地址</label>
                        <input type="text" class="form-control" id="property_address" name="property_address" value="{{ project.property_address if project else '' }}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="district">地区</label>
                        <input type="text" class="form-control" id="district" name="district" value="{{ project.district if project else '' }}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="budget_amount">预算</label>
                        <input type="number" step="0.01" class="form-control" id="budget_amount" name="budget_amount" value="{{ project.budget_amount if project else '' }}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="target_start_date">计划开始</label>
                        <input type="date" class="form-control" id="target_start_date" name="target_start_date" value="{{ project.target_start_date.isoformat() if project and project.target_start_date else '' }}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="target_end_date">计划结束</label>
                        <input type="date" class="form-control" id="target_end_date" name="target_end_date" value="{{ project.target_end_date.isoformat() if project and project.target_end_date else '' }}">
                    </div>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">{{ '更新项目' if project else '创建项目' }}</button>
    </form>
</div>
{% endblock %}
